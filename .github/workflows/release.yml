name: release

on:
  workflow_dispatch:
    inputs:
      publish_python:
        description: "Publish the Python package to PyPI"
        required: true
        default: true
        type: boolean
      publish_npm:
        description: "Publish the npm package"
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate_python:
    if: ${{ inputs.publish_python }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autocontext
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build Python distributions
        run: uv build

      - name: Smoke-install built wheel
        run: |
          python -m venv /tmp/autoctx-release-smoke
          /tmp/autoctx-release-smoke/bin/pip install dist/*.whl
          /tmp/autoctx-release-smoke/bin/autoctx --help

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: autocontext/dist/*
          retention-days: 7

  validate_npm:
    if: ${{ inputs.publish_npm }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build npm package
        run: npm run build

      - name: Pack npm tarball
        run: npm pack --json > pack.json

      - name: Verify npm tarball contents
        run: |
          PACKAGE_TGZ="$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync('pack.json','utf8')); console.log(data[0].filename);")"
          tar -tzf "$PACKAGE_TGZ" | grep '^package/README.md$'
          tar -tzf "$PACKAGE_TGZ" | grep '^package/dist/index.js$'

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: ts/*.tgz
          retention-days: 7

  publish_python:
    if: ${{ inputs.publish_python }}
    needs: validate_python
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${UV_PUBLISH_TOKEN:-}" ]; then
            echo "Missing required release secret: PYPI_API_TOKEN"
            exit 1
          fi
          uv publish dist/*

  publish_npm:
    if: ${{ inputs.publish_npm }}
    needs: validate_npm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download npm tarball
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: dist

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Missing required release secret: NPM_TOKEN"
            exit 1
          fi
          npm publish dist/*.tgz --access public
