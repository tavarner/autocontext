name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --group dev
      - name: Ruff
        run: uv run ruff check src tests
      - name: Mypy
        run: uv run mypy src
      - name: Protocol parity check
        run: uv run python ../scripts/generate_protocol.py --check

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --group dev
      - name: Tests
        run: uv run pytest --cov=src/mts --cov-report=html:htmlcov -m "not live"
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: mts/htmlcov/
          retention-days: 14

  smoke:
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --group dev
      - name: Deterministic scenario runs
        env:
          MTS_AGENT_PROVIDER: deterministic
        run: |
          uv run python -m mts.cli run --scenario grid_ctf --gens 3 --run-id ci_smoke_grid
          uv run python -m mts.cli run --scenario othello --gens 1 --run-id ci_smoke_othello
      - name: Dashboard API smoke
        env:
          MTS_AGENT_PROVIDER: deterministic
        run: |
          cleanup() { kill $SERVER_PID 2>/dev/null || true; }
          trap cleanup EXIT
          uv run mts serve --host 127.0.0.1 --port 8010 &
          SERVER_PID=$!
          sleep 2
          curl -fsS http://127.0.0.1:8010/health
          curl -fsS http://127.0.0.1:8010/api/runs

  primeintellect-live:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mts
    env:
      MTS_PRIMEINTELLECT_API_KEY: ${{ secrets.MTS_PRIMEINTELLECT_API_KEY }}
      MTS_ANTHROPIC_API_KEY: ${{ secrets.MTS_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --group dev
      - name: Live PrimeIntellect verification
        if: ${{ env.MTS_PRIMEINTELLECT_API_KEY != '' && env.MTS_ANTHROPIC_API_KEY != '' }}
        env:
          MTS_EXECUTOR_MODE: primeintellect
          MTS_PRIMEINTELLECT_API_BASE: https://api.primeintellect.ai
          MTS_AGENT_PROVIDER: anthropic
        run: uv run mts run --scenario grid_ctf --gens 1 --run-id ci_prime_live
