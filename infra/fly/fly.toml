app = "autocontext"
primary_region = "ord"

[build]
  context = "."
  dockerfile = "infra/docker/Dockerfile"

[env]
  AUTOCONTEXT_DB_PATH = "/data/runs/autocontext.sqlite3"
  AUTOCONTEXT_RUNS_ROOT = "/data/runs"
  AUTOCONTEXT_KNOWLEDGE_ROOT = "/data/knowledge"
  AUTOCONTEXT_SKILLS_ROOT = "/data/skills"
  AUTOCONTEXT_EXECUTOR_MODE = "local"
  AUTOCONTEXT_AGENT_PROVIDER = "deterministic"

[[mounts]]
  source = "mts_data"
  destination = "/data"

[processes]
  app = "run --scenario grid_ctf --gens 1"
  dashboard = "serve --host 0.0.0.0 --port 8000"
