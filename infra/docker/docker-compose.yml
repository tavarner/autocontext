services:
  autocontext:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    environment:
      AUTOCONTEXT_DB_PATH: /workspace/runs/autocontext.sqlite3
      AUTOCONTEXT_RUNS_ROOT: /workspace/runs
      AUTOCONTEXT_KNOWLEDGE_ROOT: /workspace/knowledge
      AUTOCONTEXT_SKILLS_ROOT: /workspace/skills
      AUTOCONTEXT_EXECUTOR_MODE: local
      AUTOCONTEXT_AGENT_PROVIDER: deterministic
    volumes:
      - ../../runs:/workspace/runs
      - ../../knowledge:/workspace/knowledge
      - ../../skills:/workspace/skills
    command: run --scenario grid_ctf --gens 1
  dashboard:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    environment:
      AUTOCONTEXT_DB_PATH: /workspace/runs/autocontext.sqlite3
      AUTOCONTEXT_RUNS_ROOT: /workspace/runs
      AUTOCONTEXT_KNOWLEDGE_ROOT: /workspace/knowledge
      AUTOCONTEXT_SKILLS_ROOT: /workspace/skills
      AUTOCONTEXT_AGENT_PROVIDER: deterministic
    volumes:
      - ../../runs:/workspace/runs
      - ../../knowledge:/workspace/knowledge
      - ../../skills:/workspace/skills
      - ../../autocontext/dashboard:/workspace/dashboard
    command: serve --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
